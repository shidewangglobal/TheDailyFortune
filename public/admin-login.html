<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Daily fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #120022;
      --bg-2: #22003d;
      --text: #f7efff;
      --muted: #cdb8e7;
      --primary: #a855f7;
      --primary-2: #7e22ce;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Be Vietnam Pro", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(168, 85, 247, 0.35), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(400px, 100%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 22px 20px;
      background: rgba(255,255,255,.08);
    }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
    p { margin: 0 0 16px; font-size: 14px; color: var(--muted); line-height: 1.45; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: #fff;
      background: rgba(0,0,0,.3);
    }
    input:focus { outline: none; border-color: rgba(168,85,247,.7); }
    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .err { margin-top: 10px; font-size: 13px; color: #fca5a5; display: none; }
    .err.show { display: block; }
    a.back { display: inline-block; margin-top: 14px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Khu vực quản trị</h1>
    <p>Đây là <strong>luồng 2</strong> (admin): nhập <strong>mã quản trị</strong> của site để vào bảng mã / hồ sơ. Mã này <strong>khác</strong> mã mời cho khách ở trang chủ. Không chia sẻ công khai.</p>
    <form id="form">
      <label for="pin">Mã quản trị</label>
      <input id="pin" name="pin" type="password" autocomplete="current-password" required placeholder="••••••••" />
      <p class="err" id="err"></p>
      <button type="submit" id="go">Đăng nhập</button>
    </form>
    <a class="back" href="/">← Về trang khách</a>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var next = params.get("next") || "/profile.html?entry=admin";
      var form = document.getElementById("form");
      var err = document.getElementById("err");
      var btn = document.getElementById("go");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.classList.remove("show");
        err.textContent = "";
        var pin = (document.getElementById("pin").value || "").trim();
        btn.disabled = true;
        fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pin: pin })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (x) {
            if (x.ok && x.j && x.j.ok) {
              window.location.href = next;
              return;
            }
            err.textContent = (x.j && x.j.error) ? x.j.error : "Đăng nhập thất bại.";
            err.classList.add("show");
          })
          .catch(function () {
            err.textContent = "Lỗi kết nối.";
            err.classList.add("show");
          })
          .finally(function () { btn.disabled = false; });
      });
    })();
  </script>
</body>
</html>
