<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily fortune - Quản lý Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Noto+Serif:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #120022;
      --bg-2: #22003d;
      --bg-3: #32005b;
      --card: rgba(255, 255, 255, 0.08);
      --card-2: rgba(255, 255, 255, 0.12);
      --text: #f7efff;
      --muted: #cdb8e7;
      --primary: #a855f7;
      --primary-2: #7e22ce;
      --ring: rgba(168, 85, 247, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(168, 85, 247, 0.35), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(126, 34, 206, 0.30), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      min-height: 100vh;
    }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      border-bottom: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      backdrop-filter: blur(8px);
    }
    .topbar .inner {
      width: min(1680px, calc(100vw - 24px)); margin: 0 auto; padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .topbar strong {
      font-family: "Noto Serif", Georgia, serif;
      font-size: 23px;
      letter-spacing: .4px;
      color: #f6e9ff;
      text-shadow: 0 0 14px rgba(205, 160, 255, 0.35);
    }
    .topbar a {
      color: #f5e9ff; text-decoration: none; font-size: 12px; font-weight: 700;
      border: 1px solid rgba(255,255,255,.24); padding: 6px 10px; border-radius: 999px;
      background: linear-gradient(180deg, rgba(168,85,247,.35), rgba(126,34,206,.35));
    }
    .wrap { width: min(1680px, calc(100vw - 24px)); margin: 14px auto; padding: 0 6px 20px; }
    .card {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      background: linear-gradient(180deg, var(--card), var(--card-2));
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    h1 {
      margin: 0 0 6px;
      font-family: "Noto Serif", Georgia, serif;
      color: #f6e9ff;
      font-size: 36px;
      letter-spacing: .5px;
      text-shadow: 0 0 16px rgba(205, 160, 255, 0.35);
    }
    h3 {
      margin: 0 0 10px;
      font-family: "Noto Serif", Georgia, serif;
      color: #ead3ff;
      font-size: 26px;
      letter-spacing: .4px;
    }
    .sub { margin: 0 0 14px; color: var(--muted); font-size: 17px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
    .birth { display: grid; grid-template-columns: auto 1fr auto 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
    label { display: block; font-size: 15px; font-weight: 600; color: var(--muted); margin: 0 0 5px; white-space: nowrap; }
    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 16px;
      color: #fff;
      background: rgba(0,0,0,.24);
    }
    input:focus {
      outline: none;
      border-color: var(--ring);
      box-shadow: 0 0 0 3px rgba(168,85,247,.18);
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .btn {
      border: none; border-radius: 10px; padding: 10px 13px; font-size: 15px; cursor: pointer;
    }
    .btn.primary {
      color: #fff;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
      font-weight: 700;
    }
    .btn.soft {
      color: #f3e8ff;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      font-weight: 700;
    }
    .status { margin-top: 10px; font-size: 15px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px dashed rgba(255,255,255,.14); }
    th { color: #e9d5ff; font-size: 13px; font-weight: 700; }
    .row-actions { display: flex; gap: 6px; }
    .row-actions button {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #f5e9ff;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    @media (min-width: 1500px) {
      .topbar .inner,
      .wrap { width: calc(100vw - 18px); }
    }
    @media (max-width: 820px) {
      .topbar .inner,
      .wrap { width: calc(100vw - 12px); padding-left: 2px; padding-right: 2px; }
      .topbar strong { font-size: 18px; }
      .card { padding: 12px; }
      h1 { font-size: 28px; }
      h3 { font-size: 22px; }
      .grid { grid-template-columns: 1fr; }
      .birth { grid-template-columns: auto 1fr; }
      .actions { display: grid; grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 700px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <strong>🪷 Daily fortune · Quản lý Profile</strong>
      <a href="/">Về Dashboard</a>
    </div>
  </div>

  <div class="wrap">
    <section class="card">
      <h1>Profile Gia chủ</h1>
      <p class="sub">Tạo nhiều profile, chọn profile mặc định để dùng khi khám phá.</p>

      <h3>Thêm / Sửa profile</h3>
      <div class="grid">
        <div>
          <label for="ownerName">Họ và tên</label>
          <input id="ownerName" placeholder="Ví dụ: Nguyễn Văn A" />
        </div>
        <div>
          <label for="ownerContact">Liên hệ</label>
          <input id="ownerContact" placeholder="SĐT hoặc email (tuỳ chọn)" />
        </div>
      </div>
      <div class="birth">
        <label for="ownerDay">Ngày sinh</label>
        <input id="ownerDay" type="number" min="1" max="31" placeholder="Ngày" />
        <label for="ownerMonth">Tháng sinh</label>
        <input id="ownerMonth" type="number" min="1" max="12" placeholder="Tháng" />
        <label for="ownerYear">Năm sinh (*)</label>
        <input id="ownerYear" type="number" placeholder="Bắt buộc" />
      </div>
      <div class="actions">
        <button class="btn primary" id="saveBtn" type="button">Lưu profile</button>
        <button class="btn soft" id="resetBtn" type="button">Làm mới form</button>
      </div>
      <div class="status" id="status">Sẵn sàng.</div>
    </section>

    <section class="card">
      <h3>Danh sách profile</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tên</th>
              <th>Ngày sinh</th>
              <th>Liên hệ</th>
              <th>Mặc định</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="profilesBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    var STORAGE_KEY = "daily_fortune_profiles";
    var STORAGE_ACTIVE = "daily_fortune_active_profile_id";
    var editingId = null;

    function uuid() {
      return "p-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    }

    function getProfiles() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) { return []; }
    }

    function setProfiles(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list || []));
    }

    function getActiveProfileId() {
      return localStorage.getItem(STORAGE_ACTIVE) || "";
    }

    function setActiveProfileId(id) {
      localStorage.setItem(STORAGE_ACTIVE, id || "");
    }

    function clearForm() {
      editingId = null;
      document.getElementById("ownerName").value = "";
      document.getElementById("ownerContact").value = "";
      document.getElementById("ownerDay").value = "";
      document.getElementById("ownerMonth").value = "";
      document.getElementById("ownerYear").value = "";
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function fillForm(profile) {
      if (!profile) return;
      editingId = profile.id;
      document.getElementById("ownerName").value = profile.name || "";
      document.getElementById("ownerContact").value = profile.contact || "";
      document.getElementById("ownerDay").value = profile.birthDay || "";
      document.getElementById("ownerMonth").value = profile.birthMonth || "";
      document.getElementById("ownerYear").value = profile.birthYear || "";
    }

    function renderProfiles() {
      var body = document.getElementById("profilesBody");
      var profiles = getProfiles();
      var activeId = getActiveProfileId();
      body.innerHTML = "";

      if (!profiles.length) {
        var empty = document.createElement("tr");
        empty.innerHTML = "<td colspan='5'>Chưa có profile nào.</td>";
        body.appendChild(empty);
        return;
      }

      profiles.forEach(function (p) {
        var tr = document.createElement("tr");
        var birth = [p.birthDay, p.birthMonth, p.birthYear].filter(Boolean).join("/");
        tr.innerHTML =
          "<td>" + (p.name || "-") + "</td>" +
          "<td>" + (birth || "-") + "</td>" +
          "<td>" + (p.contact || "-") + "</td>" +
          "<td>" + (p.id === activeId ? "✓" : "") + "</td>" +
          "<td><div class='row-actions'>" +
            "<button data-act='use' data-id='" + p.id + "'>Dùng</button>" +
            "<button data-act='edit' data-id='" + p.id + "'>Sửa</button>" +
            "<button data-act='del' data-id='" + p.id + "'>Xoá</button>" +
          "</div></td>";
        body.appendChild(tr);
      });
    }

    function upsertProfile() {
      var name = (document.getElementById("ownerName").value || "").trim();
      var contact = (document.getElementById("ownerContact").value || "").trim();
      var birthDay = (document.getElementById("ownerDay").value || "").trim();
      var birthMonth = (document.getElementById("ownerMonth").value || "").trim();
      var birthYear = (document.getElementById("ownerYear").value || "").trim();

      if (!name) return setStatus("Vui lòng nhập họ và tên.");
      if (!birthYear) return setStatus("Năm sinh là bắt buộc.");

      var profiles = getProfiles();
      if (editingId) {
        profiles = profiles.map(function (p) {
          if (p.id !== editingId) return p;
          return {
            id: p.id,
            name: name,
            contact: contact,
            birthDay: birthDay,
            birthMonth: birthMonth,
            birthYear: birthYear,
            updatedAt: new Date().toISOString(),
          };
        });
        setStatus("Đã cập nhật profile.");
      } else {
        var profile = {
          id: uuid(),
          name: name,
          contact: contact,
          birthDay: birthDay,
          birthMonth: birthMonth,
          birthYear: birthYear,
          updatedAt: new Date().toISOString(),
        };
        profiles.push(profile);
        if (!getActiveProfileId()) setActiveProfileId(profile.id);
        setStatus("Đã thêm profile mới.");
      }
      setProfiles(profiles);
      renderProfiles();
      clearForm();
    }

    document.getElementById("saveBtn").addEventListener("click", upsertProfile);
    document.getElementById("resetBtn").addEventListener("click", function () {
      clearForm();
      setStatus("Đã làm mới form.");
    });

    document.getElementById("profilesBody").addEventListener("click", function (e) {
      var target = e.target;
      if (!target || !target.dataset) return;
      var act = target.dataset.act;
      var id = target.dataset.id;
      if (!act || !id) return;

      var profiles = getProfiles();
      if (act === "use") {
        setActiveProfileId(id);
        renderProfiles();
        setStatus("Đã chọn profile mặc định.");
        return;
      }

      if (act === "edit") {
        var p = profiles.find(function (x) { return x.id === id; });
        fillForm(p);
        setStatus("Đang sửa profile.");
        return;
      }

      if (act === "del") {
        var next = profiles.filter(function (x) { return x.id !== id; });
        setProfiles(next);
        if (getActiveProfileId() === id) {
          setActiveProfileId(next[0] ? next[0].id : "");
        }
        renderProfiles();
        setStatus("Đã xoá profile.");
      }
    });

    renderProfiles();
  </script>
</body>
</html>
